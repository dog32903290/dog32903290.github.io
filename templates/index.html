{% extends "base.html" %}

{% block content %}
    <section class="hero" id="about">
        <div class="hero-image">
            <img src="{{ url_for('static', filename='assets/profile_new.jpg') }}" alt="Profile Photo">
        </div>
        <div class="hero-content">
            <h1>陳柏為<br>Po Wei Chen</h1>
            <div class="subtitle">Music producer | Musician | Film director |</div>
            <p style="font-weight: 200; color: #ccc; white-space: pre-line;">穿梭於聲音與影像間的跨界創作者。中山大學音樂系與台藝大電影所的雙重背景，賦予我揉合電子聲響、器樂即興與電影敘事的能力。
            從台北電影節的攝影機後，到台東藝穗節與白晝之夜的混音台前，我持續在獨立製作與跨域協作中，探索視聽感官的邊界。</p>
        </div>
    </section>

    <section class="decoration-section" style="text-align: center;">
        <div class="decoration-img-container" style="width: 100%; height: auto; min-height: 40vh; max-height: 60vh; overflow: hidden; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <img src="{{ url_for('static', filename='assets/IMG_9416.JPG') }}" alt="Decoration Gallery Art" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </div>
    </section>

    <section id="contact" class="hero">
        <div class="hero-image">
            <img src="{{ url_for('static', filename='assets/IMG_9824.JPG') }}" alt="Contact Visual">
        </div>
        <div class="hero-content">
            <h2 style="font-size: 2.5rem; font-weight: 200; margin-bottom: 2rem; letter-spacing: 0.3rem; text-transform: uppercase;">CONTACT</h2>
            <div class="contact-details" style="font-size: 1.1rem; font-weight: 200; color: #888;">
                <div style="margin-bottom: 1rem;"><span style="color: #fff; margin-right: 1rem; opacity: 0.7;">Mail</span> dog32903290@gmail.com</div>
                <div style="margin-bottom: 1rem;"><span style="color: #fff; margin-right: 1rem; opacity: 0.7;">Line ID</span> horn096</div>
            </div>
        </div>
    </section>
{% endblock %}
